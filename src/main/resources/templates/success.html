<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Başarılı</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; }
        h1 { color: #2e7d32; }
        a { color: #d32f2f; }
        .token-box {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            max-height: 100px;
            overflow-y: auto;
        }
        .copy-btn {
            margin-top: 8px;
            padding: 6px 12px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .copy-btn:hover { background: #1565c0; }
    </style>
</head>
<body>
<div class="card">
    <h1>Hoş Geldiniz</h1>
    <p><strong>Kullanıcı:</strong> <span th:text="${username}"></span></p>
    <p><strong>E-posta:</strong> <span th:text="${email}"></span></p>

    <p><strong>ID Token:</strong></p>
    <div class="token-box" id="tokenValue" th:text="${idToken}"></div>
    <button class="copy-btn" onclick="copyToken()">Kopyala</button>

    <p style="margin-top: 20px;"><a th:href="@{/auth/logout}">Çıkış Yap</a></p>
</div>

<script>
    function copyToken() {
        const token = document.getElementById('tokenValue').innerText;
        navigator.clipboard.writeText(token);
        event.target.innerText = 'Kopyalandı!';
        setTimeout(() => event.target.innerText = 'Kopyala', 1500);
    }
</script>
</body>
</html>
